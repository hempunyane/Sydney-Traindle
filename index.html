  <body>
    <script>
      // Force the orange top bar on Safari
      (function() {
        // Check if it's Safari
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        
        if (isSafari) {
          // Create a fixed orange bar at the top
          const orangeBar = document.createElement('div');
          orangeBar.style.position = 'fixed';
          orangeBar.style.top = '0';
          orangeBar.style.left = '0';
          orangeBar.style.right = '0';
          orangeBar.style.height = '10px';
          orangeBar.style.backgroundColor = '#F6891F';
          orangeBar.style.zIndex = '9999';
          orangeBar.style.pointerEvents = 'none';
          document.body.appendChild(orangeBar);
          
          // Adjust body padding
          document.body.style.paddingTop = '0';
        }
      })();
    </script>
  
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect != location.pathname) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </body>
